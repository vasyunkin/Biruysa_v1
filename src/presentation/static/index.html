<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цифровой штурман аэролодки</title>
    <link rel="stylesheet" href="static/libs/leaflet/leaflet.css">
    <link rel="stylesheet" href="static/css/base.css">
    <link rel="stylesheet" href="static/css/layout.css">
    <link rel="stylesheet" href="static/css/components.css">
</head>
<body>
    <div id="map"></div>

    <div id="top-bar">
        <button id="menu-btn">☰</button>
        <span id="app-title">Цифровой штурман</span>
        <div id="map-controls">
            <button id="layers-btn" title="Стиль карты">🗺️</button>
        </div>
    </div>

    <div id="route-panel" class="side-panel">
        <h3>📋 Планирование пути</h3>

        <div class="node-selector-box">
            <div id="badge-start" class="node-input-badge">🟢 Откуда: кликните точку</div>
            <div id="badge-finish" class="node-input-badge">🔴 Куда: кликните точку</div>
        </div>

        <button id="clear-route-btn" class="primary-btn" style="background:#e74c3c; margin-bottom:15px;">❌ Сбросить точки</button>

        <div id="route-results" class="hidden">
            <div class="mode-tabs" style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:15px;">
                <button class="primary-btn mode-tab active" data-mode="быстрый" style="font-size:12px; padding:6px;">⏱️ Быстрый</button>
                <button class="primary-btn mode-tab" data-mode="экономичный" style="font-size:12px; padding:6px; background:#7f8c8d;">⛽ Эконом</button>
                <button class="primary-btn mode-tab" data-mode="кратчайший" style="font-size:12px; padding:6px; background:#7f8c8d;">📏 Короткий</button>
                <button class="primary-btn mode-tab" data-mode="безопасный" style="font-size:12px; padding:6px; background:#7f8c8d;">🛡️ Безопасный</button>
            </div>

            <div id="route-info-card" style="background:rgba(0,0,0,0.02); padding:12px; border-radius:8px; border:1px solid var(--border-glass);">
                <div id="route-summary">Выберите режим для просмотра деталей</div>
            </div>
        </div>
    </div>

    <!-- Боковая панель: Настройки лодки -->
    <div id="boat-panel" class="side-panel">
        <h3>⛵ Настройки лодки</h3>
        <div class="boat-param">
            <label>Модель</label>
            <select id="boat-model">
                <option value="raptor650">Raptor 650</option>
            </select>
        </div>
        <div class="boat-param">
            <label>Конфигурация</label>
            <div class="radio-group">
                <input type="radio" id="config-no" name="config" value="без поддува" checked>
                <label for="config-no">Без поддува</label>
                <input type="radio" id="config-yes" name="config" value="с поддувом">
                <label for="config-yes">С поддувом</label>
            </div>
        </div>
        <div class="boat-param">
            <label>Загрузка: <span id="load-value">1.2</span> т</label>
            <input type="range" id="load-slider" min="0.5" max="1.5" step="0.1" value="1.2">
        </div>
        <div class="boat-param">
            <label>Запас топлива: <span id="fuel-value">370</span> л</label>
            <input type="range" id="fuel-slider" min="50" max="370" step="10" value="370">
        </div>
        <div class="boat-param">
            <label>Резерв топлива: <span id="reserve-value">20</span>%</label>
            <input type="range" id="reserve-slider" min="10" max="30" step="1" value="20">
        </div>
        <button id="apply-boat-settings" class="primary-btn">Применить</button>
        <div id="boat-status" style="margin-top:10px; font-size:13px; color:#8899b0;"></div>
    </div>

    <!-- Блок сравнения (появляется после нажатия "Применить") -->
    <div id="comparison-section" class="side-panel hidden" style="width: 700px; right: auto; left: 50%; transform: translateX(-50%); top: 80px; max-height: 80vh; overflow-y: auto;">
        <h3>📊 Сравнение режимов</h3>
        <div id="comparison-table-container">
            <!-- Таблица будет генерироваться JS -->
        </div>
        <div class="boat-param" style="margin-top: 15px; border-top: 1px solid var(--border-glass); padding-top: 15px;">
            <label>Вес груза: <span id="comparison-load-value">1.2</span> т</label>
            <input type="range" id="comparison-load-slider" min="0.5" max="1.5" step="0.1" value="1.2">
        </div>
        <button id="close-comparison" class="primary-btn" style="margin-top: 10px;">Закрыть</button>
    </div>

    <div id="bottom-bar">
        <button class="bottom-btn active" data-tab="boat">⛵ Лодка</button>
        <button class="bottom-btn" data-tab="route">🗺️ Маршрут</button>
        <button class="bottom-btn" data-tab="compare">📊 Сравнение режимов</button>
        <button class="bottom-btn" data-tab="log">📋 Журнал</button>
    </div>

    <div id="right-tools">
        <button id="tool-search" title="Поиск">🔍</button>
        <button id="tool-measure" title="Измерить">📏</button>
        <button id="tool-route" title="Построить маршрут">📍</button>
    </div>

    <script src="static/libs/leaflet/leaflet.js"></script>

    <script src="static/js/dom.js"></script>

    <script src="static/js/config.js"></script>
    <script src="static/js/map-init.js"></script>
    <script src="static/js/boat.js"></script>
    <script src="static/js/comparison.js"></script>   <!-- Новый файл -->
    <script src="static/js/ui.js"></script>
    <script src="static/js/route.js"></script>
    <script src="static/js/main.js"></script>
</body>
</html>
